<!DOCTYPE html>
<html>
<head>
<title>Thanh toán</title>
<link rel="stylesheet" href="/css/checkout.css">
</head>

<body>

<div class="checkout-wrapper">

<div class="checkout-left">

<a href="/" class="logo-link">
<div class="logo">
<h1>DIRTYCOINS®</h1>
<span>madeinvietnam</span>
</div>
</a>

<h2>Thông tin nhận hàng</h2>

<div class="form-group">

<div class="field">
<select id="addressBook">
<option value="">Địa chỉ khác...</option>
</select>
<label>Sổ địa chỉ</label>
</div>

<div class="field">
<input id="email" type="email" placeholder=" " readonly>
<label>Email</label>
</div>

<div class="field">
<input id="receiverName" type="text" placeholder=" ">
<label>Họ và tên</label>
</div>

<div class="field">
<input id="phone" type="text" placeholder=" ">
<label>Số điện thoại</label>
</div>

<div class="field">
<input id="addressLine" type="text" placeholder=" ">
<label>Địa chỉ</label>
</div>

<div class="field">
<input id="city" type="text" placeholder=" ">
<label>Tỉnh thành</label>
</div>

<div class="field">
<input id="district" type="text" placeholder=" ">
<label>Quận huyện</label>
</div>

<div class="field">
<input id="ward" type="text" placeholder=" ">
<label>Phường xã</label>
</div>

<div class="field">
<textarea id="note" placeholder=" "></textarea>
<label>Ghi chú (tùy chọn)</label>
</div>

</div>

<h3>Thanh toán</h3>

<div class="payment-box">
<label>
<input type="radio" name="payment" value="COD" checked>
Thanh toán khi giao hàng (COD)
</label>
<label>
  <input type="radio" name="payment" value="VNPAY">
  Thanh toán VNPay
</label>
</div>

</div>


<div class="checkout-right">

<h3>Đơn hàng</h3>

<div id="orderItems"></div>

<div class="summary-row">
<span>Tạm tính</span>
<span id="subTotal">0 đ</span>
</div>

<div class="summary-row">
<span>Phí vận chuyển</span>
<span>30.000 đ</span>
</div>

<div class="summary-total">
<span>Tổng cộng</span>
<span id="orderTotal">0 đ</span>
</div>

<a href="/cart" class="back-cart">
← Quay về giỏ hàng
</a>

<button id="checkoutBtn" onclick="handleCheckout()" class="checkout-btn">
  Đặt hàng
</button>

</div>

</div>

<script src="/js/checkout.js"></script>

</body>
</html>
