<!DOCTYPE html>
<html>
<head>
  <title>Admin - Banners</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>

<body>
<style>
    .banner-form{
margin-bottom:20px;
display:flex;
gap:10px;
align-items:center;
}

.banner-form input{
padding:6px;
}
</style>
<div id="slidebar-container"></div>

<div class="content">

<h1>Banner Management</h1>

<!-- ADD FORM -->
<div class="banner-form">

<input type="file" id="image">
<input type="text" id="title" placeholder="Title">
<input type="text" id="link" placeholder="Link">
<input type="number" id="order" placeholder="Order">

<button onclick="addBanner()">Add Banner</button>

</div>


<table border="1" width="100%" id="banner-table">

<thead>
<tr>
<th>Image</th>
<th>Title</th>
<th>Order</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>


<script src="/admin/js/admin-auth.js"></script>
<script src="/admin/js/banners.js"></script>

<script>
fetch('/admin/slidebar.html')
.then(res => res.text())
.then(html => {

document.getElementById('slidebar-container').innerHTML = html;

const adminUser = JSON.parse(localStorage.getItem("adminUser"));
const adminInfoElem = document.getElementById("adminInfo");

if (adminUser && adminInfoElem) {
adminInfoElem.innerHTML = "Xin chào: <b>" + adminUser.email + "</b>";
}

});
</script>

</body>
</html>
