<!DOCTYPE html>
<html>
<head>
  <title>Admin Chat</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <link rel="stylesheet" href="/admin/css/chat.css">
</head>
<body>

<div id="slidebar-container"></div>

<div class="content">

  <h1>Chat với khách hàng</h1>

  <div class="chat-container">

    <!-- danh sách user -->
    <div class="chat-users">
      <h3>Khách hàng</h3>
      <ul id="userList"></ul>
    </div>

    <!-- khung chat -->
    <div class="chat-box">

      <div id="chatHeader">
        Chọn khách hàng để chat
      </div>

      <div id="chatMessages"></div>

      <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Nhập tin nhắn...">
        <button id="sendBtn">Gửi</button>
      </div>

    </div>

  </div>

</div>

<script src="https://ecommerce-backend-w960.onrender.com/socket.io/socket.io.js"></script>
<script src="/admin/js/admin-auth.js"></script>
<script src="/admin/js/admin-chat.js"></script>

<script>

fetch('/admin/slidebar.html')
  .then(res => res.text())
  .then(html => {

    document.getElementById('slidebar-container').innerHTML = html;

    const adminUser = JSON.parse(localStorage.getItem("adminUser"));
    const adminInfoElem = document.getElementById("adminInfo");
    
    if (adminUser && adminInfoElem) {
      adminInfoElem.innerHTML = "Xin chào: <b>" + adminUser.email + "</b>";
    }

  });

</script>

</body>
</html>
