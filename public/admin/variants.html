<!DOCTYPE html>
<html>
<head>
  <title>Manage Variants</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>

<div id="slidebar-container"></div>

<div class="content">
  <h1>Variants</h1>

  <h3>Thêm Variant</h3>
  <input type="text" id="size" placeholder="Size">
  <input type="text" id="color" placeholder="Color">
  <input type="number" id="price" placeholder="Price">
  <input type="number" id="stock" placeholder="Stock">
  <button onclick="addVariant()">Thêm</button>

  <hr>

  <table>
    <thead>
      <tr>
        <th>Size</th>
        <th>Color</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="variantTable"></tbody>
  </table>
</div>
 <script>
   
 fetch('/admin/slidebar.html')
  .then(res => res.text())
  .then(html => {
    // 1. Chèn sidebar vào trước
    document.getElementById('slidebar-container').innerHTML = html;

    // 2. Sau đó mới chạy code hiển thị email
    const adminUser = JSON.parse(localStorage.getItem("adminUser"));
    const adminInfoElem = document.getElementById("adminInfo");
    
    if (adminUser && adminInfoElem) {
      adminInfoElem.innerHTML = "Xin chào: <b>" + adminUser.email + "</b>";
    }
  });
</script>
<script src="/admin/js/admin-auth.js"></script>
<script src="/admin/js/variants.js"></script>
</body>
</html>
