<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="/admin/css/admin.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    .card {
      padding: 20px;
      margin: 10px;
      background: #f5f5f5;
      border-radius: 10px;
      display: inline-block;
      min-width: 200px;
      font-weight: bold;
    }

    canvas {
      max-width: 700px;
      margin-top: 20px;
    }

    table {
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="slidebar-container"></div>

<div class="content">
  <h1>Dashboard</h1>

  <!-- STATS -->
  <div class="card">Products: <span id="totalProducts">0</span></div>
  <div class="card">Orders: <span id="totalOrders">0</span></div>
  <div class="card">Users: <span id="totalUsers">0</span></div>
  <div class="card">Revenue: <span id="revenue">0</span> đ</div>

  <!-- STATUS CHART -->
  <h2>Order Status</h2>
  <canvas id="statusChart"></canvas>

  <!-- REVENUE CHART -->
  <h2>Revenue By Day</h2>
  <canvas id="revenueChart"></canvas>

  <!-- RECENT ORDERS -->
  <h2>Recent Orders</h2>
  <table border="1" width="100%">
    <thead>
      <tr>
        <th>ID</th>
        <th>Total</th>
        <th>Status</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="recentOrders"></tbody>
  </table>

  <h2>Filter Revenue</h2>
<select id="month">
  <option value="3">March</option>
  <option value="4">April</option>
</select>

<select id="year">
  <option value="2026">2026</option>
</select>

<button onclick="loadRevenueChart()">Filter</button>

<h2>Top Products</h2>
<canvas id="topProductsChart"></canvas>

<h2>Top Users</h2>
<canvas id="topUsersChart"></canvas>
</div>

<script src="/admin/js/admin-auth.js"></script>
<script src="/admin/js/dashboard.js"></script>

<script>
fetch('/admin/slidebar.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('slidebar-container').innerHTML = html;

    const adminUser = JSON.parse(localStorage.getItem("adminUser"));
    const adminInfoElem = document.getElementById("adminInfo");

    if (adminUser && adminInfoElem) {
      adminInfoElem.innerHTML = "Xin chào: <b>" + adminUser.email + "</b>";
    }
  });
</script>

</body>
</html>
